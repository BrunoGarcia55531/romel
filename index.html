<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Lu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fce4ec 0%, #ffc1e3 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            justify-content: space-around;
            align-items: center;
        }

        /* --- Estilos de la Animación del Árbol (Izquierda) --- */
        .animation-zone {
            position: relative;
            width: 400px;
            height: 500px;
        }

        /* Corazón Semilla que cae */
        .seed-heart {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #e53935;
            animation: fallAndPlant 2.5s forwards;
            opacity: 1;
        }

        @keyframes fallAndPlant {
            0% { top: -50px; opacity: 1; }
            80% { top: 450px; opacity: 1; transform: translateX(-50%) scale(1); }
            100% { top: 455px; opacity: 0; transform: translateX(-50%) scale(0.5); }
        }

        /* Árbol Corazón (SVG) */
        .tree-svg {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 450px;
        }

        .tree-path {
            stroke: #8d6e63; /* Color tronco */
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            animation: drawTree 5s forwards;
            animation-delay: 2.2s; /* Empieza cuando cae la semilla */
        }

        @keyframes drawTree {
            to { stroke-dashoffset: 0; }
        }

        /* Corazones que florecen */
        .blooming-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: fadeInHearts 2s forwards;
            animation-delay: 5s; /* Empieza cuando el árbol casi termina */
        }

        @keyframes fadeInHearts {
            to { opacity: 1; }
        }

        .heart-bloom {
            position: absolute;
            color: #ff5252;
            font-size: 15px;
            animation: pulseBloom 2s infinite;
        }

        @keyframes pulseBloom {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* --- Estilos del Texto y Stitch (Derecha) --- */
        .text-zone {
            width: 45%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center; /* Centrar todo el texto */
        }

        .message {
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            color: #d81b60;
            line-height: 1.4;
            opacity: 0;
            animation: fadeInText 3s forwards;
            animation-delay: 7s; /* Empieza después de que florece todo */
            margin-bottom: 20px; /* Espacio para Stitch */
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-heart {
            color: #e53935;
            display: inline-block;
            animation: pulseBloom 1.5s infinite;
        }

        /* --- Estilos para Stitch y su Rosa --- */
        .stitch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInStitch 2s forwards;
            animation-delay: 10s; /* Stitch aparece después del texto */
        }

        @keyframes fadeInStitch {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .stitch-img {
            width: 180px; /* Tamaño de Stitch */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stitch-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            color: #555;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="animation-zone">
            <div class="seed-heart">❤️</div>

            <svg class="tree-svg" viewBox="0 0 100 120">
                <path class="tree-path" d="M50,110 C50,100 50,90 50,80 C50,60 10,60 10,35 C10,15 30,5 50,25 C70,5 90,15 90,35 C90,60 50,60 50,80" />
            </svg>

            <div class="blooming-hearts">
                <span class="heart-bloom" style="top: 150px; left: 160px; animation-delay: 5.1s;">❤️</span>
                <span class="heart-bloom" style="top: 120px; left: 120px; animation-delay: 5.3s; font-size: 12px;">❤️</span>
                <span class="heart-bloom" style="top: 90px; left: 80px; animation-delay: 5.5s;">❤️</span>
                <span class="heart-bloom" style="top: 100px; left: 180px; animation-delay: 5.2s; font-size: 18px;">❤️</span>
                <span class="heart-bloom" style="top: 70px; left: 150px; animation-delay: 5.7s;">❤️</span>
                <span class="heart-bloom" style="top: 60px; left: 195px; animation-delay: 5.4s; font-size: 14px;">❤️</span>
                <span class="heart-bloom" style="top: 90px; left: 230px; animation-delay: 5.9s;">❤️</span>
                <span class="heart-bloom" style="top: 130px; left: 260px; animation-delay: 6.1s; font-size: 16px;">❤️</span>
                <span class="heart-bloom" style="top: 170px; left: 220px; animation-delay: 6.3s;">❤️</span>
                <span class="heart-bloom" style="top: 210px; left: 190px; animation-delay: 6.5s; font-size: 10px;">❤️</span>
            </div>
        </div>

        <div class="text-zone">
            <p class="message">
                Lu amor te veo el sabado a las 2 en el kennedy <span class="final-heart">❤️</span>
            </p>

            <div class="stitch-container">
                <img class="stitch-img" src="image_0.jpeg" alt="Stitch con una rosa" onerror="this.style.display='none'">
                <p class="stitch-text">¡Stitch también te espera con una rosa! 🌹</p>
            </div>
        </div>
    </div>

</body>
</html>
